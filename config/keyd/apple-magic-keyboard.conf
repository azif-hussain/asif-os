# The Command key remains Meta/Super by default.
# Only the combinations below are translated to Linux Ctrl shortcuts.

[meta]
c = C-c
v = C-v
x = C-x
a = C-a
z = C-z
y = C-y
s = C-s
f = C-f
t = C-t
w = C-w
l = C-l
p = C-p
n = C-n
r = C-r
q = C-q
comma = C-comma

left = home
right = end
